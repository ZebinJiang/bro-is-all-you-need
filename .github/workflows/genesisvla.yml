name: GenesisVLA

on:
  pull_request:
    paths:
      - "AGENTS.md"
      - "boundaries.txt"
      - "genesisvla/**"
      - "tests/core/**"
      - "tests/config/**"
      - "tests/dataloader/**"
      - "tests/maintenance/**"
      - "tests/slurm/**"
      - ".codex/**"
      - "coordination/**"
      - "docs/genesisvla/**"
      - "docs/references/**"
      - "docs/coordination/**"
      - ".agent-docs/**"
      - ".agents/**"
      - "scripts/quality/**"
      - "requirements/quality/**"
      - "scripts/maintenance/**"
      - "scripts/slurm/**"
      - "pyrightconfig.genesisvla.json"
      - "Makefile"
      - "pyproject.toml"
      - ".pre-commit-config.yaml"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".github/workflows/**"
      - "tests/meta/**"
  push:
    paths:
      - "AGENTS.md"
      - "boundaries.txt"
      - "genesisvla/**"
      - "tests/core/**"
      - "tests/config/**"
      - "tests/dataloader/**"
      - "tests/maintenance/**"
      - "tests/slurm/**"
      - ".codex/**"
      - "coordination/**"
      - "docs/genesisvla/**"
      - "docs/references/**"
      - "docs/coordination/**"
      - ".agent-docs/**"
      - ".agents/**"
      - "scripts/quality/**"
      - "requirements/quality/**"
      - "scripts/maintenance/**"
      - "scripts/slurm/**"
      - "pyrightconfig.genesisvla.json"
      - "Makefile"
      - "pyproject.toml"
      - ".pre-commit-config.yaml"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".github/workflows/**"
      - "tests/meta/**"

jobs:
  genesis-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Cache GenesisVLA quality wheelhouse
        uses: actions/cache@v4
        with:
          path: |
            runs/tmp/GVLA-M2-TOOLENV-RECOVERY-001/wheelhouse
            runs/tmp/m1-tool-pip-cache
          key: genesisvla-quality-${{ runner.os }}-${{ runner.arch }}-py3.10-${{ hashFiles('requirements/quality/quality-requirements.txt', 'requirements/quality/quality-constraints.txt', 'pyproject.toml') }}
          restore-keys: |
            genesisvla-quality-${{ runner.os }}-${{ runner.arch }}-py3.10-
      - name: Fill GenesisVLA project-local wheelhouse
        run: bash scripts/quality/bootstrap_project_local_tools.sh --fill-wheelhouse
      - name: Bootstrap GenesisVLA project-local gate tools
        run: bash scripts/quality/bootstrap_project_local_tools.sh
      - name: Run GenesisVLA gate
        run: make genesis-check
      - name: Run GenesisVLA governance gate
        run: make governance-check
      - name: Run GenesisVLA build gate
        run: make genesis-build-check
