name: GenesisVLA

on:
  pull_request:
    paths:
      - "AGENTS.md"
      - "boundaries.txt"
      - "genesisvla/**"
      - "tests/meta/**"
      - "tests/core/**"
      - "tests/config/**"
      - ".codex/**"
      - "coordination/**"
      - "docs/genesisvla/**"
      - "docs/coordination/**"
      - ".agent-docs/**"
      - ".agents/**"
      - "scripts/quality/**"
      - "pyrightconfig.genesisvla.json"
      - "Makefile"
      - "pyproject.toml"
      - ".pre-commit-config.yaml"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".github/workflows/**"
  push:
    paths:
      - "AGENTS.md"
      - "boundaries.txt"
      - "genesisvla/**"
      - "tests/meta/**"
      - "tests/core/**"
      - "tests/config/**"
      - ".codex/**"
      - "coordination/**"
      - "docs/genesisvla/**"
      - "docs/coordination/**"
      - ".agent-docs/**"
      - ".agents/**"
      - "scripts/quality/**"
      - "pyrightconfig.genesisvla.json"
      - "Makefile"
      - "pyproject.toml"
      - ".pre-commit-config.yaml"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".github/workflows/**"

jobs:
  genesis-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install GenesisVLA package and gate tools
        run: python -m pip install -e ".[dev]"
      - name: Run GenesisVLA gate
        run: make genesis-check
