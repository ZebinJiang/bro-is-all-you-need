tool_memory_schema_version: 1
source_doc: docs/coordination/TOOL_MEMORY_GOVERNANCE.md
active_model_label: gpt-5.5
authority: advisory_only
entry_status_rule: entries_must_be_schema_approved_or_pending_inactive
new_entry_approval_required:
  - Tooling
  - Quality
compute_entry_additional_approval_required:
  - Compute/HPC
advisory_only: true
hard_limits:
  cannot_replace_validation: true
  cannot_replace_owner_approval: true
  cannot_authorize_pr_mutation: true
  cannot_set_completion_state: true
  cannot_authorize_compute: true
entries:
  - id: governance_loop_local_shell_only
    scope: GVLA-GOVERNANCE-PROMPT-LOOP-V2-OWNER-RETAIN-001
    category: governance_tooling
    generalized_signature: local_shell_only_prompt_loop_repair
    detection_commands_or_signals:
      - top_level_prompt_forbids_devspace_mcp_and_remote_publication
      - workspace_verification_uses_pwd_git_root_branch_head_status
    approved_recovery_pattern: use_local_shell_git_and_allowed_file_edits_only_when_loop_spec_allows
    prohibited_recovery_actions:
      - devspace_mcp_as_internal_evidence
      - connector_publication_without_loop_authorization
      - treating_memory_as_validation_or_owner_approval
    owner_responsible:
      - Tooling
      - Quality
    last_reviewed_by: pending
    evidence_links:
      - coordination/reports/GVLA-GOVERNANCE-PROMPT-LOOP-V2-OWNER-RETAIN-001/owner-quality-repair-2.md
    expiry_or_review_trigger: before_any_future_active_use_or_publication_gate
    approval_state: pending_tooling_quality_review
    status: inactive
  - id: connector_fallback_policy
    scope: prompt_controlled_loops
    category: connector_governance
    generalized_signature: connector_unavailable_or_not_authorized_during_governance_loop
    detection_commands_or_signals:
      - connector_action_policy_missing_or_disallows_action
      - connector_command_unavailable_auth_failed_or_not_required
    approved_recovery_pattern: record_local_evidence_or_blocked_status_only_when_resolved_loop_spec_permits_fallback
    prohibited_recovery_actions:
      - mutate_pr_without_authorization
      - bypass_exact_head_or_scan_gates
      - treating_connector_failure_as_completion
    owner_responsible:
      - Tooling
      - Quality
    last_reviewed_by: pending
    evidence_links:
      - docs/coordination/PROMPT_CONTROLLED_LOOP_PROTOCOL.md
      - coordination/reports/GVLA-GOVERNANCE-PROMPT-LOOP-V2-OWNER-RETAIN-001/owner-quality-repair-2.md
    expiry_or_review_trigger: before_any_connector_fallback_is_used_as_active_loop_guidance
    approval_state: pending_tooling_quality_review
    status: inactive
  - id: LOGIN_NODE_CPU_SATURATION_REQUIRES_COMPUTE_ROUTING
    scope: prompt_controlled_loops
    category: compute_governance
    generalized_signature: heavy_validation_or_cpu_saturation_on_login_node
    detection_commands_or_signals:
      - full_pytest_or_build_or_long_validation_requested_on_login_node
      - validation_timeout_or_cpu_saturation_without_compute_policy
      - compute_command_classification_unknown_or_heavy
    approved_recovery_pattern: stop_and_route_to_Compute_HPC_Owner_with_explicit_compute_policy
    prohibited_recovery_actions:
      - continue_heavy_validation_on_login_node
      - invent_compute_budget_or_partition
      - treat_login_node_failure_as_pass
    owner_responsible:
      - Compute/HPC
      - Quality
    last_reviewed_by: pending
    evidence_links:
      - docs/coordination/COMPUTE_EXECUTION_GOVERNANCE.md
    expiry_or_review_trigger: before_any_heavy_validation_or_compute_route
    approval_state: pending_compute_quality_review
    status: inactive
  - id: SLURM_SANDBOX_OR_ENV_WRAPPER_RETRY_WITH_ESCALATION
    scope: prompt_controlled_loops
    category: compute_governance
    generalized_signature: slurm_wrapper_or_environment_failure_under_authorized_compute_route
    detection_commands_or_signals:
      - approved_project_slurm_wrapper_fails_due_sandbox_or_environment_boundary
      - command_local_proxy_or_escalation_needed_for_same_authorized_wrapper
    approved_recovery_pattern: retry_the_same_project_wrapper_with_explicit_escalation_only_if_compute_policy_authorizes_it
    prohibited_recovery_actions:
      - switch_to_raw_srun_or_sbatch
      - bypass_project_wrapper
      - expand_resources_after_scheduler_rejection
    owner_responsible:
      - Compute/HPC
      - Tooling
      - Quality
    last_reviewed_by: pending
    evidence_links:
      - docs/coordination/COMPUTE_EXECUTION_GOVERNANCE.md
    expiry_or_review_trigger: before_any_escalated_compute_retry
    approval_state: pending_compute_tooling_quality_review
    status: inactive
  - id: SLURM_POLICY_REJECTION_STOP_DO_NOT_BYPASS
    scope: prompt_controlled_loops
    category: compute_governance
    generalized_signature: scheduler_policy_or_resource_rejection
    detection_commands_or_signals:
      - slurm_or_wrapper_rejects_partition_account_qos_reservation_or_policy
      - scheduler_preflight_reports_policy_conflict
    approved_recovery_pattern: stop_with_BLOCKED_COMPUTE_POLICY_and_request_user_or_Compute_HPC_decision
    prohibited_recovery_actions:
      - bypass_scheduler_policy
      - change_partition_account_qos_or_resource_shape_without_authorization
      - retry_raw_srun_sbatch_after_policy_rejection
    owner_responsible:
      - Compute/HPC
      - Quality
    last_reviewed_by: pending
    evidence_links:
      - docs/coordination/COMPUTE_EXECUTION_GOVERNANCE.md
    expiry_or_review_trigger: before_any_retry_after_scheduler_rejection
    approval_state: pending_compute_quality_review
    status: inactive
  - id: GIT_LFS_LOCKSVERIFY_PROXY_TIMEOUT_CANDIDATE
    scope: git_publication
    category: git_network_governance
    generalized_signature: git_lfs_locksverify_proxy_timeout_during_push
    detection_commands_or_signals:
      - lfs_locksverify_request_times_out_through_project_proxy
      - normal_non_force_push_is_otherwise_scan_clean
    approved_recovery_pattern: candidate_only_record_for_manager_review_before_one_off_locksverify_false_retry
    prohibited_recovery_actions:
      - make_locksverify_false_default
      - canonicalize_locksverify_bypass_in_templates_or_state
      - use_locksverify_false_without_task_specific_user_or_manager_authorization
    owner_responsible:
      - Tooling
      - Quality
    last_reviewed_by: pending
    evidence_links:
      - docs/coordination/OWNER_DISPATCH_GOVERNANCE.md
    expiry_or_review_trigger: before_any_lfs_locksverify_retry
    approval_state: candidate_only_not_default
    status: candidate_only
