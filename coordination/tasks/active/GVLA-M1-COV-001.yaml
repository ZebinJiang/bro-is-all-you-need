test_design_constraints:
  - Use small numpy arrays.
  - Do not import torch.
  - Do not use external data.
  - Do not access the network.
  - Do not write runs, datasets, or external paths.
  - Use pytest tmp_path for temporary checkpoint paths if needed.
  - Use clear contract-oriented test function names.
  - New comments and docstrings must be Chinese.
  - Do not use runtime_checkable or isinstance to fake Protocol testing.
  - Prefer fake classes plus explicit Protocol type annotation for Pyright structural checks.
required_validation_commands:
