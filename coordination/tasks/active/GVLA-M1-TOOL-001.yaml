  - marking M1 complete
  - modifying passes: true
  - commit, push, or pull request work
  - using /tmp/vla-flywheel-m0-tools/bin
  - using /tmp/*
  - global dependency installation
  - modifying conda base, system Python, or user shell configuration
  - deleting runs/tmp/m1-qg-venv or other temporary environments without explicit cleanup approval
