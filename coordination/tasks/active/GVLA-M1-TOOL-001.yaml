environment:
  venv_path: runs/tmp/m1-tool-venv
  pip_cache_path: runs/tmp/m1-tool-pip-cache
  pip_tmp_path: runs/tmp/m1-tool-pip-tmp
  filelist_tmp_path: runs/tmp/m1-tool-filelists
  prefer_python: python3.10
  fallback_python: python
  no_global_install: true
  no_system_tmp: true
required_setup_commands:
  - python3.10 -m venv runs/tmp/m1-tool-venv
  - python -m venv runs/tmp/m1-tool-venv
  - PIP_CACHE_DIR=runs/tmp/m1-tool-pip-cache TMPDIR=runs/tmp/m1-tool-pip-tmp runs/tmp/m1-tool-venv/bin/python -m pip install -U pip
  - PIP_CACHE_DIR=runs/tmp/m1-tool-pip-cache TMPDIR=runs/tmp/m1-tool-pip-tmp runs/tmp/m1-tool-venv/bin/python -m pip install pytest black ruff pyright numpy omegaconf
required_diagnostics:
  - runs/tmp/m1-tool-venv/bin/python -m black --version
  - runs/tmp/m1-tool-venv/bin/python -m black --check --line-length 100 --workers 1 tests/meta/test_repo_policy.py
  - runs/tmp/m1-tool-venv/bin/python -m black --check --line-length 100 --workers 1 tests/core
  - runs/tmp/m1-tool-venv/bin/python -m black --check --line-length 100 --workers 1 tests/config
  - runs/tmp/m1-tool-venv/bin/python -m black --check --line-length 100 --workers 1 genesisvla
  - runs/tmp/m1-tool-venv/bin/python -m black --check --line-length 100 --workers 1 genesisvla tests/meta tests/core tests/config
  - runs/tmp/m1-tool-venv/bin/python -c "import sys, site, numpy, omegaconf, pytest; print(sys.executable); print(site.getsitepackages()); print(numpy.__file__); print(omegaconf.__file__); print(pytest.__file__)"
  - runs/tmp/m1-tool-venv/bin/pyright --version
  - runs/tmp/m1-tool-venv/bin/pyright --verbose -p pyrightconfig.genesisvla.json
  - runs/tmp/m1-tool-venv/bin/pyright --pythonpath /home/cz-jzb/workspace/vla-flywheel/runs/tmp/m1-tool-venv/bin/python --verbose -p pyrightconfig.genesisvla.json
required_validation_commands:
  - runs/tmp/m1-tool-venv/bin/python -m py_compile tests/meta/test_repo_policy.py
  - runs/tmp/m1-tool-venv/bin/python -m pytest tests/meta/test_repo_policy.py tests/core tests/config -v
  - runs/tmp/m1-tool-venv/bin/python -m black --check --line-length 100 --workers 1 tests/meta/test_repo_policy.py
  - runs/tmp/m1-tool-venv/bin/python -m ruff check --config 'line-length=100' genesisvla tests/meta tests/core tests/config
  - runs/tmp/m1-tool-venv/bin/pyright -p pyrightconfig.genesisvla.json
conditional_validation_commands:
  - bash scripts/quality/genesis_check_project_local.sh
