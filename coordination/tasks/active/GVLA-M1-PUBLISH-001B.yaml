  pr_title: "M1: accept core contracts and typed config"
acceptance_criteria:
  - Branch is dev/*.
  - Pre-commit wrapper and git workflow scans pass.
  - Quality Owner returns APPROVE_COMMIT.
  - Initial commit is created and pushed.
  - Real PR URL is created or updated and recorded.
  - M1 milestone passes true only after PR URL exists.
  - Publication evidence commit is created and pushed.
  - No PR merge is performed.
subagent_retirement:
