  quality_result: APPROVE_SCAN_CLEAR
  architecture_scope_review: accepted_in_GVLA-M1-PUBLISH-001A-FIX
in_scope:
  - Create this task card and update coordination state.
  - Stage only approved 001B task, state, and report files before initial commit.
  - Run project-local wrapper and required git workflow scans before commit.
  - Dispatch existing Quality Owner thread for pre-commit staged-set review.
  - Commit accepted staged deliverables on the current dev branch after Quality approval.
  - Push the current dev branch to origin.
  - Create or update a PR and record the real PR URL.
  - After PR URL exists, update M1 publication evidence and set M1 milestone passes true.
  - Commit and push the publication evidence update as a second commit.
out_of_scope:
  - Merging the PR.
  - Starting M2 automatically.
  - Editing M1 source implementation.
  - Editing tests.
  - Editing scripts/quality/genesis_check_project_local.sh.
  - Editing Makefile, pyrightconfig.genesisvla.json, or pyproject.toml.
  - Editing M2+ implementation scope.
  - Deleting files or cleaning runs/tmp.
  - Using /tmp tool environments, global pip, conda base, or system Python changes.
  - Using DevSpace MCP as internal workflow evidence.
allowed_manager_write_scope:
  - coordination/tasks/active/GVLA-M1-PUBLISH-001B.yaml
  - coordination/reports/GVLA-M1-PUBLISH-001B/**
  - coordination/PROGRAM_STATE.yaml
  - coordination/TASK_INDEX.yaml
  - .agent-docs/feature_list.json
  - .agent-docs/progress.txt
  - .agent-docs/review.txt
  - git commits on current dev branch
  - git push to origin current dev branch
  - PR create/update
allowed_quality_owner_write_scope:
  - coordination/reports/GVLA-M1-PUBLISH-001B/owner-quality-precommit.md
forbidden_operations:
  - git reset --hard
  - git clean
  - git add .
  - staging unapproved new scope
  - PR merge
  - source behavior edits
  - test edits
  - Makefile edits
  - pyrightconfig edits
  - pyproject edits
  - DevSpace MCP internal workflow use
required_precommit_validation:
  - bash scripts/quality/genesis_check_project_local.sh
  - git diff --cached --check
  - git diff --cached --stat
  - git diff --cached --name-only
  - secret scan from .agent-docs/git_workflow.md
  - artifact extension scan from .agent-docs/git_workflow.md
  - large staged-file scan from .agent-docs/git_workflow.md
  - large text-diff scan from .agent-docs/git_workflow.md
  - forbidden path scan
  - DevSpace MCP internal workflow dependency scan
