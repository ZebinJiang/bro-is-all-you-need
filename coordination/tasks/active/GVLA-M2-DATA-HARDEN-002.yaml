objective: >
  Implement Data-owned M2 hardening after Architecture contract integration:
  production transform serialization, image/action semantics, canonical
  normalization/collation masks, statistics/cache invariants, mixture
  distributed determinism, fixtures, legacy adapter, and CPU tiny E2E coverage.
in_scope:
  - Production transform config roundtrip and registry factories.
  - Image HWC/CHW behavior, construction validation, and context-derived RNG.
  - ActionMode zero-policy inverse/reference behavior and mapping validation.
  - Canonical sample and batch action masks in normalization/collation.
  - Variable horizon/action-dim padding and deterministic batch schema.
  - Statistics invariant ownership, read-only arrays, strict JSON, fsync, and concurrency.
  - Mixture finite positive weights, names, seed/epoch/worker/rank behavior,
    independent RNG streams, and resume metadata.
  - Fixture classification and real-format dependency proposal if needed.
  - Legacy adapter metadata, robot_tag, warning, and unsupported-field behavior.
out_of_scope:
  - Architecture-owned contract surface unless reopened by Architecture.
  - Remote CI/workflow/bootstrap implementation.
  - M3 training/model implementation.
  - Committing binary fixture files or dataset dumps.
allowed_write_scope:
  - genesisvla/dataloader/**
  - genesisvla/testing/fixtures/**
  - tests/dataloader/**
  - docs/genesisvla/m2_transform_data_contract.md
  - docs/genesisvla/adr/ADR-001-m2-upstream-design-selection.md
  - coordination/reports/GVLA-M2-DATA-HARDEN-002/**
protected_paths:
  - genesisvla/core/** except Architecture-approved imports/types already integrated
  - genesisvla/model/**
  - genesisvla/training/**
  - genesisvla/deployment/**
  - genesisvla/acceleration/**
  - datasets/**
  - code-input/**
  - .agent-docs/feature_list.json pass fields
acceptance_criteria:
  - Production pipeline can serialize, JSON roundtrip, deserialize from a fresh
    registry, and produce numerical-equivalent outputs.
  - HWC and CHW image transforms, deterministic context RNG, and invalid image
    params are tested.
  - Zero first-step action mode is either reversible with explicit reference or
    clearly fails as non-invertible.
  - Collation returns typed batch with canonical `[B,H,D]` mask and explicit
    variable horizon/action-dim padding.
  - Statistics own read-only arrays, reject invalid invariants, write safely,
    and pass concurrency/stale-cache tests.
  - Mixture sampling validates rank/world/worker inputs and deterministic resume.
  - Fixtures are not mislabeled real unless real-format evidence or user scope
    approval exists.
  - Architecture and Quality reviews approve.
