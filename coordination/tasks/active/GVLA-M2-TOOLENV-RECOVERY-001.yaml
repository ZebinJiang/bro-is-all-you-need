  - old M2 worktree
  - M1 worktrees and branches
  - remote branches
  - starVLA/**
  - code-input/**
  - datasets/**
  - .agent-docs/feature_list.json pass fields
  - model/training/deployment/acceleration implementation
acceptance_criteria:
  - Offline bootstrap works from the wheelhouse.
  - Each required worktree has its own valid venv; no venv is copied, moved, or symlinked between worktrees.
  - Wheelhouse manifest and archive hashes pass.
  - Actual build and clean wheel install pass.
  - Source provenance checks prove imports/build/type analysis target the intended worktree.
  - Architecture patch validation passes.
  - Quality toolchain validation passes.
  - Data confirms remaining diagnostics are source work, not environment work.
  - All recovery subagents are retired.
required_commands_or_checks:
  - offline project-local bootstrap
  - make genesis-check
  - make governance-check
  - project-local strict Pyright
  - pytest tests/core tests/config tests/dataloader tests/meta -q
  - python -m build --no-isolation
  - clean wheel install
  - pip check
  - import genesisvla
  - source provenance verification
  - py.typed verification
  - wheel content scan
  - git diff --check
  - changed-file scope scan
  - type-ignore and suppression scan
  - protected-path scan
