objective: >
  Establish a reproducible offline-first project-local quality environment,
  validate the existing Architecture patch, produce and validate a superseding
  Quality patch when needed, and reopen the GVLA-M2-UNBLOCK-001 Wave 1 gate.
in_scope:
  - Inventory existing project-local environments, caches, wheel archives, and tool versions.
  - Design a lean quality dependency set, constraints/lock, wheelhouse, manifest, and readiness protocol.
  - Implement the recovery in Quality scratch through one write-capable worker.
  - Validate per-worktree venv/source provenance, actual build, clean wheel install, and offline bootstrap.
  - If recovery gate passes, resume the previously authorized sequential canonical integration.
out_of_scope:
  - Publication, commit, push, PR, merge, force operation, or remote branch mutation.
  - M1 or M2 milestone completion.
  - M2 semantic hardening beyond strict typing/build unblock.
  - M3 implementation.
  - Deleting the miswritten main-checkout report.
manager_write_scope:
  - coordination/tasks/**
  - coordination/reports/GVLA-M2-TOOLENV-RECOVERY-001/**
  - coordination/reports/GVLA-M2-UNBLOCK-001/**
  - coordination/PROGRAM_STATE.yaml
  - coordination/TASK_INDEX.yaml
  - runs/tmp/GVLA-M2-TOOLENV-RECOVERY-001/**
manager_must_not:
  - edit source or tests
  - edit bootstrap scripts
  - create a tool environment directly
  - apply candidate patches directly
  - simulate an Owner
  - delete the main-checkout miswritten report
  - perform publication actions
quality_owner_write_scope_wave1b:
  scratch_worktree: /home/cz-jzb/workspace/vla-flywheel/.worktrees/gvla-m2-toolchain-scratch
  source_paths:
    - pyproject.toml
    - Makefile
    - scripts/quality/**
    - tests/meta/**
