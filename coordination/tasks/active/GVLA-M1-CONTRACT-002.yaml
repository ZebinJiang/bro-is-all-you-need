acceptance_criteria:
  - Public config dataclass constructors enforce the required invariants.
  - Focused tests cover the invariant without changing public M1 semantics.
  - Architecture report concludes PASS or gives exact blocker.
  - Quality review approves or records exact test/contract blocker.
required_commands:
  - bash scripts/quality/genesis_check_project_local.sh
  - runs/tmp/m1-tool-venv/bin/python -m pytest tests/config tests/core tests/meta -v
