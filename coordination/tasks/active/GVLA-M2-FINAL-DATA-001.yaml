objective: >
  Implement generated actual Parquet and LeRobot-format fixture evidence, then
  close the residual collator, strict mask, image-normalization, relative action,
  and statistics invariant gaps without adding M3 behavior.
in_scope:
  - Generated actual `.parquet` files under pytest `tmp_path` or `runs/tmp/**`, never committed.
  - Exact pinned LeRobot v3 format target and generated real-format directory validation.
  - RawSample adapter/validator path from generated real fixture data.
  - Strict collator image modality key-set handling and action mask type validation.
  - Strict bool-mask handling in state/action normalization.
  - ImageNormalize finite/positive invariants.
  - Relative action one-dimensional state policy unless Architecture approves another policy.
  - FeatureStatistics/DatasetStatistics invariant hardening.
  - CPU E2E from real generated file fixture to RawSample, transforms, collator, statistics cache, inverse comparison.
out_of_scope:
  - M3 training/model implementation.
  - Runtime dataset downloads or large fixture files.
  - Mandatory full LeRobot dependency unless explicitly approved through FIXTURE-DEPS.
  - Generated Parquet, MP4, or dataset binary publication.
allowed_write_scope:
  - genesisvla/testing/fixtures/**
  - genesisvla/dataloader/**
  - tests/dataloader/**
  - docs/genesisvla/m2_*
  - docs/genesisvla/adr/ADR-001-m2-upstream-design-selection.md
  - docs/references/upstream_sources.yaml
  - coordination/reports/GVLA-M2-FINAL-DATA-001/**
protected_paths:
  - genesisvla/core/** except import-safe references already approved by Architecture
  - genesisvla/model/**
  - genesisvla/training/**
  - genesisvla/deployment/**
  - genesisvla/acceleration/**
  - datasets/**
  - code-input/**
  - generated fixture binaries
  - .agent-docs/feature_list.json pass fields
acceptance_criteria:
  - Actual generated Parquet files are written/read with schema, footer, dtype, row-count, list-shape, and null-policy validation.
  - Generated LeRobot-format fixture records exact repo/release/revision/license/format version and validates metadata/data relationships.
  - Malformed real fixtures fail clearly without silent fallback to in-memory fixtures.
  - Existing in-memory fixtures are renamed or labeled as `*_like_fixture` if retained.
  - Collator compares image modality key sets, uses deterministic output ordering, and rejects missing/extra modalities.
  - Action masks and statistics masks reject implicit numeric/string/object coercion.
  - ImageNormalize rejects zero, negative, NaN, and Inf std/mean values as appropriate.
  - Relative action mode rejects multidimensional/temporal state with a clear error under the minimal M2 policy.
  - Statistics reject incomplete/contradictory invariants, empty names, duplicate names, and non-bool masks.
  - Full dataloader tests, direct Pyright, and `git diff --check` pass.
required_commands:
