benchmark_policy:
  primary_worker_count: 8
  same_subset_required: true
  minimum_smoke_subset: 4 episodes and 512 samples
  preferred_subset: at least 32 episodes or 10000 samples if compute budget permits
  repeats: at least 3 per backend unless time budget prevents
  compute_node_required_for_benchmark: true
  default_allocation:
    partition: a100
    nodes: 1
    ntasks: 1
    cpus_per_task: 32
    memory: 128G
    gres: gpu:1
    time_limit: "04:00:00"
acceptance_criteria:
  - PR #16 remains draft and unmerged.
  - ZJH source dataset remains read-only.
  - At least three candidate backends are benchmarked, including raw v2.1.
  - Any unrun backend has explicit reason.
  - Final comparison uses worker_count=8.
  - Generated artifacts are ignored and not tracked.
  - Benchmark report and docs table exist.
  - Root README/dashboard is updated if active StarVLA branding remains.
  - Backend recommendation is explicit.
  - No real training, model/checkpoint load, W&B/HF network, endpoint, or robot occurs.
  - Dependency changes occur only after Owner approval.
  - Required Owner reviews pass.
  - Draft PR is created and left draft.
