acceptance:
  pass_or_warn_required_for_merge: true
  pass_definition:
    - training_store_batch_latency_ms_p50 <= 0.50 * raw_batch_latency_ms_p50
    - OR speedup_vs_raw_decode >= 2.0 using the explicit raw_comparison_basis
    - when raw_comparison_basis is media_decode_bottleneck, the raw effective p50/p95 preserve raw media decode bottleneck evidence without overwriting raw batch p50/p95
    - active bottleneck is no longer unaccounted raw media decode
  warn_definition:
    - improvement exists but threshold is not met
    - telemetry incomplete
    - Owner reviewers explicitly approve foundation PR status
  fail_definition:
    - training store read remains decode or I/O dominated
    - training store read is not materially faster
    - store path is unreliable
