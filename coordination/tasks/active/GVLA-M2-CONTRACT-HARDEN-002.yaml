objective: >
  Define and implement the M2 public contract hardening needed before M3:
  JSON-typed immutable transform specs, versioned fingerprints, serializable
  transform protocol, transform execution context, typed collated batch, and
  canonical action mask semantics.
in_scope:
  - JsonScalar, JsonValue, and JsonObject public type aliases.
  - TransformSpec string-key, deep-immutable, JSON-safe, finite params with
    schema and implementation version fields.
  - SerializableTransformProtocol or `to_spec()` public serialization contract.
  - Versioned stable transform/statistics fingerprint semantics.
  - Immutable TransformContext with seed, epoch, sample key, worker id, and rank.
  - Typed CollatedBatch or equivalent M2 dataloader contract.
  - Canonical `[H,D]` sample and `[B,H_max,D_max]` batch action mask.
  - Compatibility and migration notes for legacy dict collator callers.
out_of_scope:
  - Concrete production transform factory implementation owned by Data.
  - Remote CI and publication mechanics owned by Quality.
  - M3 runner/model implementation.
allowed_write_scope:
  - genesisvla/core/protocols/transform.py
  - genesisvla/dataloader/contracts.py
  - genesisvla/dataloader/transforms/compose.py
  - genesisvla/dataloader/statistics/schema.py
  - genesisvla/dataloader/collate.py
  - genesisvla/dataloader/__init__.py
  - genesisvla/dataloader/transforms/__init__.py
  - tests/dataloader/test_transform_registry.py
  - tests/dataloader/test_dataset_statistics.py
  - tests/dataloader/test_collate.py
  - tests/dataloader/test_cpu_tiny_e2e.py
  - docs/genesisvla/m2_transform_data_contract.md
  - coordination/reports/GVLA-M2-CONTRACT-HARDEN-002/**
protected_paths:
  - genesisvla/model/**
  - genesisvla/training/**
  - genesisvla/deployment/**
  - genesisvla/acceleration/**
  - datasets/**
  - code-input/**
  - .agent-docs/feature_list.json pass fields
acceptance_criteria:
  - TransformSpec rejects non-JSON values, NaN/Inf, canonical-key collisions,
    and mutable caller-owned params.
  - Transform fingerprint changes when implementation version changes and is
    deterministic across mapping order.
  - Public serialization no longer relies on `getattr()` as the contract.
  - Non-serializable transforms fail explicitly.
  - TransformContext and CollatedBatch are documented and tested.
  - Statistics arrays are defensively owned/read-only and covered by focused tests.
  - CollatedBatch or equivalent canonical `[B,H,D]` action-mask contract is
    defined or clearly handed off to DATA-HARDEN with Architecture acceptance.
  - M1 public contracts are not regressed.
  - Data and Quality reviews approve.
required_commands:
