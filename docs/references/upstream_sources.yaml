  - name: StarVLA-base
    repository: https://github.com/ZebinJiang/bro-is-all-you-need
    source_archive: none
    source_archive_sha256: none
    exact_revision: 5e42b775f97d438ae58752f986284da9c4adf98b
    license: MIT
    reviewed_paths:
      - genesisvla/core/types/sample.py
      - genesisvla/core/types/action.py
      - docs/genesisvla/rfc_000_architecture.md
      - docs/genesisvla/coding_standard.md
      - docs/genesisvla/testing_standard.md
    reused_symbols: []
    reuse_type: inspiration
    local_destination:
      - genesisvla/dataloader/**
      - genesisvla/testing/fixtures/**
      - docs/genesisvla/adr/ADR-001-m2-upstream-design-selection.md
    attribution:
      required_if_copied_or_adapted: true
      current_genesisvla_code_reuse: inspired-only; no copied or adapted StarVLA source
    notes:
      - M2 keeps RawSample as the data boundary and does not modify M1 contracts.
      - Design extraction is documented in the M2 ADR.
  - name: PyArrow
    repository: https://github.com/apache/arrow
    source_archive: none
    source_archive_sha256: none
    exact_revision: pypi:pyarrow==18.1.0
    license: Apache-2.0
    reviewed_paths:
      - https://pypi.org/project/pyarrow/18.1.0/
      - requirements/quality/quality-requirements.txt
      - requirements/quality/quality-constraints.txt
      - tests/meta/test_repo_policy.py
    reused_symbols:
      - pyarrow.parquet write/read API for generated real-format fixture tests
    reuse_type: test_quality_dependency
    local_destination:
      - requirements/quality/**
      - genesisvla/testing/fixtures/**
      - tests/dataloader/**
      - tests/meta/test_repo_policy.py
    attribution:
      required_if_copied_or_adapted: false
      current_genesisvla_code_reuse: dependency only; no copied or adapted PyArrow source
    notes:
      - PyArrow is pinned as a test/quality-only Parquet backend for M2 final closure.
      - PyArrow must not be exposed from GenesisVLA public APIs without a separate Architecture approval.
      - Wheelhouse and generated Parquet artifacts remain project-local under runs/tmp and are not staged.
